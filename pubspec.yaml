name: presensi
description: "A new Flutter project for mockup presence apps"

publish_to: 'none' # Remove this line if you wish to publish to pub.dev

version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  camera: ^0.10.5+9
  cupertino_icons: ^1.0.2
  flutter:
    sdk: flutter
  google_mlkit_face_detection: ^0.10.0
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  image: ^4.0.17
  image_picker: ^1.0.4
  intl: ^0.19.0
  path_provider: ^2.1.1
  tflite_flutter: ^0.11.0

dev_dependencies:
  build_runner: ^2.4.7
  flutter_lints: ^2.0.0
  flutter_test:
    sdk: flutter
  hive_generator: ^2.0.1

flutter:
  uses-material-design: true
  assets:
    - assets/models/
    - android/app/src/main/assets/models/
    - android\app\src\main\assets\models\spoof_model_scale_2_7.tflite
